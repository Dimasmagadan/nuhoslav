<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Odor{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: ui-monospace, "Cascadia Code", "Source Code Pro", monospace; }
    </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen">
    <nav class="border-b border-gray-800 px-6 py-4">
        <div class="max-w-4xl mx-auto flex items-center justify-between">
            <a href="/" class="text-lg font-bold text-amber-400 tracking-tight">⚗ odor</a>
            <div class="flex gap-6 text-sm text-gray-400">
                <a href="/" class="hover:text-white transition-colors">status</a>
                <a href="/vessels" class="hover:text-white transition-colors">vessels</a>
                <a href="/history" class="hover:text-white transition-colors">history</a>
            </div>
        </div>
    </nav>
    <main class="max-w-4xl mx-auto px-6 py-8">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
